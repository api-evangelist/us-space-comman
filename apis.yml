    description: >-
      Space-Track.org is the official public source for US Space Command's satellite catalog and space situational
      awareness data, maintained by the 18th Space Defense Squadron. The REST API provides access to orbital element
      sets (GP/TLEs), the satellite catalog (SATCAT), conjunction data messages (CDMs), decay predictions (TIP), and
      space object history. Requires a free Space-Track.org account for authentication.
