created: '2024-12-03'
modified: '2026-05-19'
position: Consuming
description: >-
  US Space Command (USSPACECOM) is a unified combatant command in the United States Department of Defense responsible
  for conducting operations in, from, and through space to deter conflict and, if necessary, defeat aggressors. The
  command provides space situational awareness (SSA) data through Space-Track.org, including the official satellite
  catalog with orbital element sets, conjunction warnings, and reentry predictions for all tracked objects.
features:
  - Orbital Element Sets (GP / TLE)
  - Satellite Catalog (SATCAT)
  - Conjunction Data Messages (CDM)
  - Tracking and Impact Prediction (TIP)
  - Historical Orbital Ephemerides
  - Space Object Decay Data
useCases:
  - Satellite operations and collision avoidance
  - Space debris monitoring
  - Orbital mechanics research
  - Satellite tracking and identification
  - Space traffic management
  - Launch planning and collision risk assessment
integrations:
  - TraCSS (Traffic Coordination System for Space)
solutions:
  - Space Situational Awareness
  - Space Traffic Management
  - Orbital Debris Research
