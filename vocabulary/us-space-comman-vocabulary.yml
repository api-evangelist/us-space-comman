vocabulary:
  name: US Space Command Space Situational Awareness Vocabulary
  description: >-
    Domain vocabulary for US Space Command's Space-Track.org API, covering
    orbital mechanics, space situational awareness, and space object tracking.
  version: "1.0.0"
  created: "2026-05-03"
  domain: Space Situational Awareness

terms:
  - term: Space Situational Awareness (SSA)
    definition: >-
      The ability to understand and maintain an accurate and complete picture of
      the space environment, including the status, location, and behavior of all
      space objects that could affect operations.
    type: Concept
    tags: [Space, Defense]

  - term: NORAD Catalog Number
    definition: >-
      A sequential five-digit number assigned by the US Space Surveillance Network
      to each Earth-orbiting satellite or space object for tracking purposes.
    type: Identifier
    tags: [Space, Tracking]

  - term: International Designator
    definition: >-
      A standardized string (YYYY-NNNPPP) identifying a satellite by its launch
      year, launch number, and piece designation within a launch.
    type: Identifier
    tags: [Space, Standards]

  - term: General Perturbations (GP)
    definition: >-
      Analytical methods for computing orbital trajectories using mathematical
      approximations. The GP class in Space-Track provides orbital element sets
      generated by the SGP4 propagator.
    type: Technical
    tags: [Space, Orbital Mechanics]

  - term: Two-Line Element Set (TLE)
    definition: >-
      A standardized data format encoding orbital elements of an Earth-orbiting
      space object on two 69-character lines, used for orbital propagation with SGP4.
    type: Standard
    tags: [Space, Orbital Mechanics, Standards]

  - term: SGP4
    definition: >-
      Simplified General Perturbations 4 — the mathematical model used to
      calculate orbital positions from TLE data. The standard propagator used by
      USSPACECOM for the public satellite catalog.
    type: Algorithm
    tags: [Space, Orbital Mechanics]

  - term: Conjunction Data Message (CDM)
    definition: >-
      A standardized CCSDS message format issued when two tracked space objects
      are predicted to come within a defined miss distance, indicating potential
      collision risk.
    type: Standard
    tags: [Space, Collision Avoidance, Standards]

  - term: Probability of Collision (PC)
    definition: >-
      The estimated probability that two tracked space objects will physically
      collide during a predicted close approach event.
    type: Metric
    tags: [Space, Collision Avoidance]

  - term: Time of Closest Approach (TCA)
    definition: >-
      The predicted date and time at which two space objects will be at their
      minimum distance during a conjunction event.
    type: Metric
    tags: [Space, Collision Avoidance]

  - term: Satellite Catalog (SATCAT)
    definition: >-
      The comprehensive catalog of all Earth-orbiting objects tracked by the
      US Space Surveillance Network, including payloads, rocket bodies, and debris.
    type: Dataset
    tags: [Space, Tracking]

  - term: Orbital Decay
    definition: >-
      The gradual decrease in orbital altitude of a space object due to
      atmospheric drag, eventually leading to reentry.
    type: Physical Process
    tags: [Space, Orbital Mechanics]

  - term: Tracking and Impact Prediction (TIP)
    definition: >-
      USSPACECOM messages forecasting when and where a decaying space object
      will reenter the Earth's atmosphere.
    type: Data Product
    tags: [Space, Reentry]

  - term: 18th Space Defense Squadron
    definition: >-
      The USSPACECOM unit responsible for maintaining the satellite catalog,
      issuing conjunction warnings, and operating Space-Track.org.
    type: Organization
    tags: [Space, Defense, Government]

  - term: Space Debris
    definition: >-
      Non-functional space objects in orbit, including defunct satellites,
      spent rocket stages, and fragmentation debris from collisions or explosions.
    type: Concept
    tags: [Space, Environment]

  - term: Eccentricity
    definition: >-
      A dimensionless parameter (0 to <1 for elliptical orbits) describing how
      much an orbit deviates from a perfect circle.
    type: Orbital Element
    tags: [Space, Orbital Mechanics]

  - term: Inclination
    definition: >-
      The angle between the orbital plane and Earth's equatorial plane, measured
      in degrees. Higher inclinations enable access to higher latitudes.
    type: Orbital Element
    tags: [Space, Orbital Mechanics]

  - term: TraCSS
    definition: >-
      Traffic Coordination System for Space — the Office of Space Commerce (NOAA)
      system being developed to take over public spaceflight safety services
      from USSPACECOM as of 2026.
    type: System
    tags: [Space, Government]
