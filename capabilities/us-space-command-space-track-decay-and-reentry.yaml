naftiko: 1.0.0-alpha2
info:
  label: Space-Track.org REST API — Decay and Reentry
  description: 'Space-Track.org REST API — Decay and Reentry. 2 operations. Lead operation: List Satellite Decay Data. Self-contained
    Naftiko capability covering one Us Space Comman business surface.'
  tags:
  - Us Space Comman
  - Decay and Reentry
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    US_SPACE_COMMAN_API_KEY: US_SPACE_COMMAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: us-space-command-space-track-decay-and-reentry
    baseUri: https://www.space-track.org
    description: Space-Track.org REST API — Decay and Reentry business capability. Self-contained, no shared references.
    resources:
    - name: basicspacedata-query-class-decay-format-format
      path: /basicspacedata/query/class/decay/format/{format}
      operations:
      - name: listdecaydata
        method: GET
        description: List Satellite Decay Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: path
          type: string
          required: true
        - name: NORAD_CAT_ID
          in: query
          type: string
        - name: DECAY_EPOCH
          in: query
          type: string
          description: Decay date filter
        - name: orderby
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    - name: basicspacedata-query-class-tip-format-format
      path: /basicspacedata/query/class/tip/format/{format}
      operations:
      - name: listtrackingimpactpredictions
        method: GET
        description: List Tracking and Impact Predictions (TIP)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: path
          type: string
          required: true
        - name: NORAD_CAT_ID
          in: query
          type: string
        - name: CCSDS_OD_SPAN
          in: query
          type: string
        - name: orderby
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    authentication:
      type: apikey
      key: chocolatechip
      value: '{{env.US_SPACE_COMMAN_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: us-space-command-space-track-decay-and-reentry-rest
    port: 8080
    description: REST adapter for Space-Track.org REST API — Decay and Reentry. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/basicspacedata/query/class/decay/format/{format}
      name: basicspacedata-query-class-decay-format-format
      description: REST surface for basicspacedata-query-class-decay-format-format.
      operations:
      - method: GET
        name: listdecaydata
        description: List Satellite Decay Data
        call: us-space-command-space-track-decay-and-reentry.listdecaydata
        with:
          format: rest.format
          NORAD_CAT_ID: rest.NORAD_CAT_ID
          DECAY_EPOCH: rest.DECAY_EPOCH
          orderby: rest.orderby
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/basicspacedata/query/class/tip/format/{format}
      name: basicspacedata-query-class-tip-format-format
      description: REST surface for basicspacedata-query-class-tip-format-format.
      operations:
      - method: GET
        name: listtrackingimpactpredictions
        description: List Tracking and Impact Predictions (TIP)
        call: us-space-command-space-track-decay-and-reentry.listtrackingimpactpredictions
        with:
          format: rest.format
          NORAD_CAT_ID: rest.NORAD_CAT_ID
          CCSDS_OD_SPAN: rest.CCSDS_OD_SPAN
          orderby: rest.orderby
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: us-space-command-space-track-decay-and-reentry-mcp
    port: 9090
    transport: http
    description: MCP adapter for Space-Track.org REST API — Decay and Reentry. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-satellite-decay-data
      description: List Satellite Decay Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: us-space-command-space-track-decay-and-reentry.listdecaydata
      with:
        format: tools.format
        NORAD_CAT_ID: tools.NORAD_CAT_ID
        DECAY_EPOCH: tools.DECAY_EPOCH
        orderby: tools.orderby
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: list-tracking-and-impact-predictions
      description: List Tracking and Impact Predictions (TIP)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: us-space-command-space-track-decay-and-reentry.listtrackingimpactpredictions
      with:
        format: tools.format
        NORAD_CAT_ID: tools.NORAD_CAT_ID
        CCSDS_OD_SPAN: tools.CCSDS_OD_SPAN
        orderby: tools.orderby
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
