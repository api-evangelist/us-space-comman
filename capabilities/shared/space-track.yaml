naftiko: "1.0.0-alpha1"

info:
  label: "Space-Track.org REST API"
  description: >-
    Space-Track.org provides US Space Command's official space situational
    awareness data, including orbital elements, satellite catalog, conjunction
    warnings, and decay predictions.
  tags:
    - Space Situational Awareness
    - Orbital Data
    - Satellite Tracking
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      SPACE_TRACK_USERNAME: SPACE_TRACK_USERNAME
      SPACE_TRACK_PASSWORD: SPACE_TRACK_PASSWORD

capability:
  consumes:
    - type: http
      namespace: space-track
      baseUri: https://www.space-track.org
      description: "Space-Track.org REST API for space situational awareness data."
      authentication:
        type: basic
        username: "{{SPACE_TRACK_USERNAME}}"
        password: "{{SPACE_TRACK_PASSWORD}}"
      resources:
        - name: general-perturbations
          path: /basicspacedata/query/class/gp/format/json
          description: "Current orbital element sets"
          operations:
            - name: list-current-gp
              method: GET
              description: "Get current orbital elements for tracked space objects"
              inputParameters:
                - name: NORAD_CAT_ID
                  in: query
                  type: string
                  required: false
                  description: "NORAD catalog number"
                - name: OBJECT_NAME
                  in: query
                  type: string
                  required: false
                  description: "Object name (supports ~~ wildcard)"
                - name: EPOCH
                  in: query
                  type: string
                  required: false
                  description: "Epoch filter (e.g., >now-30)"
                - name: DECAY_DATE
                  in: query
                  type: string
                  required: false
                  description: "Decay date filter (null-val for active)"
                - name: COUNTRY_CODE
                  in: query
                  type: string
                  required: false
                  description: "Country code filter"
                - name: orderby
                  in: query
                  type: string
                  required: false
                  description: "Sort order"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: satellite-catalog
          path: /basicspacedata/query/class/satcat/format/json
          description: "Satellite catalog metadata"
          operations:
            - name: list-satcat
              method: GET
              description: "Query satellite catalog"
              inputParameters:
                - name: NORAD_CAT_ID
                  in: query
                  type: string
                  required: false
                  description: "NORAD catalog number"
                - name: OBJECT_TYPE
                  in: query
                  type: string
                  required: false
                  description: "Object type (PAYLOAD, ROCKET BODY, DEBRIS, UNKNOWN)"
                - name: COUNTRY_CODE
                  in: query
                  type: string
                  required: false
                  description: "Country code"
                - name: DECAY_DATE
                  in: query
                  type: string
                  required: false
                  description: "Decay date (null-val for active)"
                - name: orderby
                  in: query
                  type: string
                  required: false
                  description: "Sort order"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: conjunction-data
          path: /basicspacedata/query/class/cdm_public/format/json
          description: "Conjunction data messages (collision warnings)"
          operations:
            - name: list-conjunctions
              method: GET
              description: "List conjunction data messages by probability of collision"
              inputParameters:
                - name: SAT_1_ID
                  in: query
                  type: string
                  required: false
                  description: "Primary object NORAD ID"
                - name: SAT_2_ID
                  in: query
                  type: string
                  required: false
                  description: "Secondary object NORAD ID"
                - name: PC
                  in: query
                  type: string
                  required: false
                  description: "Collision probability filter"
                - name: orderby
                  in: query
                  type: string
                  required: false
                  description: "Sort order (e.g., PC desc)"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: decay-data
          path: /basicspacedata/query/class/decay/format/json
          description: "Satellite decay and reentry data"
          operations:
            - name: list-decays
              method: GET
              description: "List satellite decay and reentry records"
              inputParameters:
                - name: NORAD_CAT_ID
                  in: query
                  type: string
                  required: false
                  description: "NORAD catalog number"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: boxscore
          path: /basicspacedata/query/class/boxscore/format/json
          description: "Space object counts by country"
          operations:
            - name: get-boxscore
              method: GET
              description: "Get space object counts by country and type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: space-track-api
      resources:
        - path: /v1/satellites
          name: satellites
          description: "Space object orbital elements"
          operations:
            - method: GET
              name: list-satellites
              description: "Query current orbital elements"
              call: "space-track.list-current-gp"
              with:
                NORAD_CAT_ID: "rest.norad_cat_id"
                OBJECT_NAME: "rest.object_name"
                COUNTRY_CODE: "rest.country_code"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/conjunctions
          name: conjunctions
          description: "Conjunction warnings"
          operations:
            - method: GET
              name: list-conjunctions
              description: "List collision warnings"
              call: "space-track.list-conjunctions"
              with:
                orderby: "PC desc"
                limit: "rest.limit"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: space-track-mcp
      transport: http
      tools:
        - name: query-orbital-elements
          description: "Query current orbital elements (TLEs) for tracked space objects"
          hints:
            readOnly: true
            openWorld: true
          call: "space-track.list-current-gp"
          with:
            NORAD_CAT_ID: "tools.norad_cat_id"
            OBJECT_NAME: "tools.object_name"
            COUNTRY_CODE: "tools.country_code"
            EPOCH: "tools.epoch"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: query-satellite-catalog
          description: "Search the satellite catalog for object metadata"
          hints:
            readOnly: true
            openWorld: true
          call: "space-track.list-satcat"
          with:
            NORAD_CAT_ID: "tools.norad_cat_id"
            OBJECT_TYPE: "tools.object_type"
            COUNTRY_CODE: "tools.country_code"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-collision-warnings
          description: "Get conjunction data messages (CDMs) for potential close approaches"
          hints:
            readOnly: true
            openWorld: true
          call: "space-track.list-conjunctions"
          with:
            SAT_1_ID: "tools.sat_1_id"
            SAT_2_ID: "tools.sat_2_id"
            PC: "tools.pc_threshold"
            orderby: "PC desc"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-reentry-data
          description: "Get satellite decay and reentry records"
          hints:
            readOnly: true
            openWorld: true
          call: "space-track.list-decays"
          with:
            NORAD_CAT_ID: "tools.norad_cat_id"
            limit: "tools.limit"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-space-object-counts
          description: "Get counts of tracked space objects by country and type (boxscore)"
          hints:
            readOnly: true
            openWorld: false
          call: "space-track.get-boxscore"
          outputParameters:
            - type: array
              mapping: "$."
